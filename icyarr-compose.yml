version: "3.9"

services:
  icyarr:
    container_name: icyarr
    build:
      context: ./icyarr
      dockerfile: ./Dockerfile
    expose:
      - "8000"
    volumes:
      - ./icyarr/channel.db:/app/channel.db
    restart: unless-stopped

  icyarr-frontend:
    container_name: icyarr-frontend
    build:
      context: ./icyarr/frontend
    ports:
      - "5173:5173"
    restart: unless-stopped
