version: "3.9"

services:
  icyarr:
    container_name: icyarr

    # Pull or build the Icyarr image
    image: ghcr.io/yourname/icyarr:latest
    # OR:
    # build:
    #   context: ./icyarr
    #   dockerfile: ./Dockerfile

    # Icyarr serves BOTH the static control panel AND the backend API
    # on a single port (8000). Only this port needs to be published.
    #
    # The backend is NOT a separate service and does NOT need its own
    # exposed port — FastAPI serves everything together.
    #
    # If you reverse-proxy through NPM, you only proxy this one port.
    ports:
      - "8000:8000"

    # Persist the SQLite database outside the container
    volumes:
      - ./icyarr/channel.db:/app/channel.db

    restart: unless-stopped

    # Healthcheck (optional but recommended)
    # Ensures the container is actually responding before marking it healthy.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
