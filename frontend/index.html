<!DOCTYPE html> <!-- HTML5 document declaration -->
<html>
<head>
    <title>Icyarr Control Panel</title> <!-- Browser tab title -->
</head>

<body> <!-- All visible content lives here -->


    <!-- ========================= -->
    <!-- M3U LOADER SECTION        -->
    <!-- ========================= -->

    <h2>M3U Loader</h2> <!-- Section title -->

    <input id="m3uInput" type="text" placeholder="Enter M3U URL">
    <!-- Text box for entering an M3U playlist URL -->

    <button onclick="loadM3U()">Load M3U</button>
    <!-- Button that triggers the loadM3U() function -->

    <pre id="m3uResult"></pre>
    <!-- Displays formatted JSON results from backend -->


    <!-- ========================= -->
    <!-- STREAM TESTER SECTION     -->
    <!-- ========================= -->

    <h2>Stream Tester</h2>

    <input id="streamInput" type="text" placeholder="Enter Stream URL">
    <!-- Text box for entering a direct stream URL -->

    <button onclick="testStream()">Test Stream</button>
    <!-- Button that triggers testStream() -->

    <pre id="streamResult"></pre>
    <!-- Shows backend response -->


    <!-- ========================= -->
    <!-- LOCAL STREAM LIST         -->
    <!-- ========================= -->

    <h2>Local Streams</h2>

    <button onclick="loadLocalStreams()">Load Local Streams</button>
    <!-- Button that fetches the local list -->

    <div id="localStreamsEditor"></div>
    <!-- Dynamic UI area for editing name/group/delete -->

    <pre id="localStreamsResult"></pre>
    <!-- Raw JSON display -->


<script> <!-- Start of JavaScript -->


    // ============================
    // FUNCTION: Load M3U
    // ============================
    async function loadM3U() {
        const url = document.getElementById("m3uInput").value;

        const response = await fetch("/load_m3u", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url })
        });

        const data = await response.json();

        document.getElementById("m3uResult").textContent =
            JSON.stringify(data, null, 2);
    }


    // ============================
    // FUNCTION: Test Stream
    // ============================
    async function testStream() {
        const url = document.getElementById("streamInput").value;

        const response = await fetch("/test_stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url })
        });

        const data = await response.json();

        document.getElementById("streamResult").textContent =
            JSON.stringify(data, null, 2);
    }


    // ============================
    // FUNCTION: Load Local Streams
    // ============================
    async function loadLocalStreams() {
        const response = await fetch("/local_streams");
        const data = await response.json();

        // Show raw JSON
        document.getElementById("localStreamsResult").textContent =
            JSON.stringify(data, null, 2);

        // Clear editor UI
        const editor = document.getElementById("localStreamsEditor");
        editor.innerHTML = "";


        // Build editor UI for each channel
        data.forEach(channel => {

            const div = document.createElement("div");
            div.style.marginBottom = "10px";
            // Container for each station


            // Display URL
            div.appendChild(document.createTextNode(channel.url));
            div.appendChild(document.createElement("br"));


            // ============================
            // NAME INPUT
            // ============================
            const nameInput = document.createElement("input");
            nameInput.value = channel.name || "";
            nameInput.placeholder = "Name";


            // ============================
            // GROUP INPUT
            // ============================
            const groupInput = document.createElement("input");
            groupInput.value = channel.group || "";
            groupInput.placeholder = "Group";


            // ============================
            // SAVE BUTTON
            // ============================
            const saveBtn = document.createElement("button");
            saveBtn.textContent = "Save";

            saveBtn.onclick = async () => {
                await fetch("/update_channel", {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        url: channel.url,
                        name: nameInput.value,
                        group: groupInput.value
                    })
                });

                loadLocalStreams(); // Refresh UI
            };


            // ============================
            // DELETE BUTTON
            // ============================
            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "Delete";
            deleteBtn.style.marginLeft = "10px";

            deleteBtn.onclick = async () => {
                await fetch(`/delete_channel?url=${encodeURIComponent(channel.url)}`, {
                    method: "DELETE"
                });

                loadLocalStreams(); // Refresh UI
            };


            // ============================
            // ADD ELEMENTS TO UI
            // ============================
            div.appendChild(nameInput);
            div.appendChild(groupInput);
            div.appendChild(saveBtn);
            div.appendChild(deleteBtn);

            editor.appendChild(div);
        });
    }


</script> <!-- End of JavaScript -->

</body>
</html>
