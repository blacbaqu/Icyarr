<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Page Title -->
    <title>Icyarr Dashboard</title>

    <!-- Tailwind CSS Framework -->
    <!-- This loads Tailwind from CDN so you don't need a build step -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX for dynamic partial updates -->
    <!-- HTMX lets your fragments update without full page reloads -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<!-- 
    Theme-aware body styling.
    If theme == 'light', background is light gray with dark text.
    If theme == 'dark', background is dark gray with light text.
-->
<body class="{% if theme == 'light' %}
                bg-gray-100 text-gray-900
              {% else %}
                bg-gray-900 text-gray-200
              {% endif %}
              min-h-screen">

    <!-- Main container -->
    <div class="max-w-5xl mx-auto p-6 space-y-6">

        <!-- Header Section -->
        <div class="flex justify-between items-center">

            <!-- Title -->
            <h1 class="text-3xl font-bold">Icyarr Dashboard</h1>

            <!-- Right-side header controls -->
            <div class="flex items-center space-x-3">

                <!-- 
                    Theme Toggle Button
                    This sends an HTMX POST to /toggle-theme
                    The server returns updated HTML for #theme-toggle
                -->
                <div
                    hx-post="/toggle-theme"
                    hx-target="#theme-toggle"
                    hx-swap="innerHTML"
                    class="cursor-pointer select-none px-3 py-2 rounded bg-gray-700 hover:bg-gray-600"
                >

                    <!-- The part that gets swapped by HTMX -->
                    <div id="theme-toggle">

                        {% if theme == "dark" %}
                            <!-- Dark mode indicator -->
                            <span class="text-gray-300">🌙 Dark</span>
                        {% else %}
                            <!-- Light mode indicator -->
                            <span class="text-yellow-500">☀️ Light</span>
                        {% endif %}

                    </div>
                </div>

            </div>
        </div>

        <!-- 
            Main content block.
            All pages (index.html, fragments, etc.) insert their content here.
        -->
        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
